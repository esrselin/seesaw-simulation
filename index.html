<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seesaw Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Seesaw Simulation</h1>

    <div class="info">
  <div class="info-box">
    <span class="label">Left Weight</span>
    <strong id="left-weight">0</strong>
  </div>

  <div class="info-box">
    <span class="label">Right Weight</span>
    <strong id="right-weight">0</strong>
  </div>

  <div class="info-box">
    <span class="label">Next Weight</span>
    <strong id="next-weight">0</strong>
  </div>

  <div class="info-box">
    <span class="label">Tilt Angle</span>
    <strong id="tilt-angle">0°</strong>
  </div>
</div>

    <div class="scene">
      <div class="seesaw-wrapper">
        <div class="plank" id="plank">
          <div id="objects-layer"></div>
        </div>
        <div class="pivot"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
